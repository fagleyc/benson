packages:
  respeaker-satellite: github://formatBCE/Respeaker-Lite-ESPHome-integration/config/common/respeaker-satellite-base.yaml@main

esphome:
  name: respeaker-kitchen
  friendly_name: ReSpeaker Kitchen

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Respeaker-Kitchen Fallback"
    password: !secret wifi_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

# Custom "Hey Benson" wake-word model, served by Benson via Caddy over
# HTTPS (Caddy terminates TLS with its internal CA on 192.168.0.240:443
# and reverse-proxies to the middleware on :8100). The compile machine
# may need to trust Caddy's root CA — install via
# https://192.168.0.240/caddy-root.crt if Python complains at compile time.
#
# `models: !extend` ADDS to formatBCE's base list (okay_nabu, kenobi,
# hey_jarvis, hey_mycroft, stop) so they all coexist; HA's Assist
# pipeline picks which one the satellite actively listens for via
# `select.respeaker_kitchen_wake_word`.
micro_wake_word:
  models: !extend
    - model: https://192.168.0.240/microwakeword/hey_benson.json
      id: hey_benson
