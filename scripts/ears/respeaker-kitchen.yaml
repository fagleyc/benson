packages:
  respeaker-satellite: github://formatBCE/Respeaker-Lite-ESPHome-integration/config/common/respeaker-satellite-base.yaml@main

esphome:
  name: respeaker-kitchen
  friendly_name: ReSpeaker Kitchen

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Respeaker-Kitchen Fallback"
    password: !secret wifi_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

# Custom "Hey Benson" wake-word model, served by Benson middleware over
# plain HTTP on the LAN. The manifest references hey_benson.tflite by
# bare filename, which ESPHome resolves relative to the manifest URL.
# `models: !extend` ADDS to formatBCE's base list (okay_nabu, kenobi,
# hey_jarvis, hey_mycroft, stop) so they all coexist; HA's Assist
# pipeline picks which one the satellite actively listens for via
# `select.respeaker_kitchen_wake_word`.
micro_wake_word:
  models: !extend
    - model: http://192.168.0.240:8100/microwakeword/hey_benson.json
      id: hey_benson
