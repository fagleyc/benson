packages:
  respeaker-satellite: github://formatBCE/Respeaker-Lite-ESPHome-integration/config/common/respeaker-satellite-base.yaml@main

esphome:
  name: respeaker-kitchen
  friendly_name: ReSpeaker Kitchen

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Respeaker-Kitchen Fallback"
    password: !secret wifi_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

# Custom "Hey Benson" wake-word model, served by Benson via Caddy over
# HTTPS (Caddy terminates TLS with its internal CA on 192.168.0.240:443
# and reverse-proxies to the middleware on :8100). If the compile
# machine doesn't trust Caddy's root CA, install it from
# https://192.168.0.240/caddy-root.crt before flashing.
#
# `!extend` MUST go on the block key (`micro_wake_word: !extend`), not
# the nested `models:` list. ESPHome's !extend does a shallow merge of
# block keys, so the `models:` list is REPLACED, not appended. We
# re-list the base pretrained models (okay_nabu, hey_jarvis, hey_mycroft,
# stop) here so the sensitivity selector in the base YAML still finds
# them by id. `kenobi` is dropped (formatBCE-specific, niche).
# microphone / vad / on_wake_word_detected inherit from the base.
micro_wake_word: !extend
  models:
    - model: https://github.com/kahrendt/microWakeWord/releases/download/okay_nabu_20241226.3/okay_nabu.json
      id: okay_nabu
    - model: hey_jarvis
      id: hey_jarvis
    - model: hey_mycroft
      id: hey_mycroft
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
    - model: https://192.168.0.240/microwakeword/hey_benson.json
      id: hey_benson
