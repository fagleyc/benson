packages:
  # Forked from formatBCE's respeaker-satellite-base.yaml — we added the
  # hey_benson model entry directly to the models: list so ESPHome's
  # !extend limitation on nested singleton lists is sidestepped entirely.
  # External_components inside the base still pull from formatBCE upstream.
  respeaker-satellite: github://fagleyc/benson/microwakeword/respeaker-satellite-base.yaml@main

esphome:
  name: respeaker-kitchen
  friendly_name: ReSpeaker Kitchen

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Respeaker-Kitchen Fallback"
    password: !secret wifi_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

# Hey Benson lives in the forked base YAML (models: list, line ~1376),
# so no override needed here — clean inheritance from the package import.
