packages:
  respeaker-satellite: github://formatBCE/Respeaker-Lite-ESPHome-integration/config/common/respeaker-satellite-base.yaml@main

esphome:
  name: respeaker-kitchen
  friendly_name: ReSpeaker Kitchen

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Respeaker-Kitchen Fallback"
    password: !secret wifi_fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

# Custom "Hey Benson" wake-word model.
#
# ESPHome fetches the .json manifest at COMPILE TIME (and the .tflite it
# references) and bakes the bytes into the firmware image. So the URL
# below must be reachable from the build machine AND Python's `requests`
# library must trust the TLS chain. Plain http:// is rejected by the
# validator; HTTPS with a self-signed cert fails on the Python side
# unless the CA is installed into certifi's bundle. Public GitHub raw
# URLs avoid both problems.
#
# `models: !extend` APPENDS this entry to formatBCE's base list
# (okay_nabu, kenobi, hey_jarvis, hey_mycroft, stop) — block-level keys
# inherit, ONLY the new model is added.
micro_wake_word:
  models: !extend
    - model: https://raw.githubusercontent.com/fagleyc/benson/main/microwakeword/models/hey_benson.json
      id: hey_benson
