# Copy to `secrets.yaml` next to respeaker-kitchen.yaml on your laptop,
# fill in the four values, then run:
#   esphome run respeaker-kitchen.yaml
#
# Generate api_encryption_key with:  openssl rand -base64 32
# Pick any fallback password >= 8 chars (only used if home WiFi is down).

wifi_ssid: "YOUR_HOME_SSID"
wifi_password: "YOUR_HOME_WIFI_PASSWORD"
wifi_fallback_password: "fagley-respeaker"
api_encryption_key: "GENERATE_WITH_openssl_rand_base64_32"
ota_password: "GENERATE_WITH_openssl_rand_base64_24"
